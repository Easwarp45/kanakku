<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Kanakku — You're Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #0A0A0F;
      --card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --primary: #A855F7;
      --cyan: #22D3EE;
      --fg: #f0f4f8;
      --muted: #6b7280;
    }
    html, body {
      margin: 0; padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      display: flex; align-items: center; justify-content: center;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background:
        radial-gradient(ellipse 80% 50% at 20% -20%, rgba(168,85,247,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 110%, rgba(12,200,224,0.08) 0%, transparent 60%);
    }
    .card {
      width: 100%;
      max-width: 360px;
      margin: 1.5rem;
      padding: 2rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1.25rem;
      text-align: center;
    }
    .icon-wrap {
      width: 72px; height: 72px;
      margin: 0 auto 1.5rem;
      border-radius: 1.25rem;
      background: rgba(168,85,247,0.15);
      border: 1px solid rgba(168,85,247,0.3);
      display: flex; align-items: center; justify-content: center;
    }
    .icon-wrap svg { width: 36px; height: 36px; color: var(--primary); }
    h1 {
      font-size: 1.375rem; font-weight: 700; margin: 0 0 0.5rem;
      letter-spacing: -0.02em;
    }
    p {
      font-size: 0.875rem; color: var(--muted); margin: 0 0 1.5rem;
      line-height: 1.6;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.75rem 2rem;
      background: linear-gradient(135deg, var(--primary), #9333ea);
      color: #fff;
      border: none; border-radius: 0.75rem;
      font-size: 0.9375rem; font-weight: 600; cursor: pointer;
      width: 100%; justify-content: center;
      box-shadow: 0 0 24px rgba(168,85,247,0.35);
      transition: opacity 0.2s;
      min-height: 48px;
    }
    .btn:hover { opacity: 0.9; }
    .hint {
      font-size: 0.75rem; color: var(--muted); margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>
      Kanakku needs a connection to load.<br />
      Your data is safe — we'll sync everything when you're back online.
    </p>
    <button class="btn" onclick="window.location.reload()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Try Again
    </button>
    <p class="hint">Your offline expenses will sync automatically once connected.</p>
  </div>
</body>
</html>
