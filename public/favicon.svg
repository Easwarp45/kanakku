<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Neon cyan to green to yellow gradient matching the logo -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00CFFF"/>
      <stop offset="40%"  stop-color="#00E87A"/>
      <stop offset="100%" stop-color="#CCFF00"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- "K" vertical bar -->
  <rect x="130" y="120" width="52" height="272" rx="10" fill="url(#logoGrad)" filter="url(#glow)"/>

  <!-- "K" upper diagonal (top-right arm) -->
  <polygon points="182,256 340,120 390,120 240,256" fill="url(#logoGrad)" filter="url(#glow)"/>

  <!-- "K" lower diagonal (bottom-right arm) -->
  <polygon points="182,256 390,392 340,392 182,270" fill="url(#logoGrad)" filter="url(#glow)"/>

  <!-- Rupee symbol — horizontal bars at top -->
  <!-- Top bar of ₹ -->
  <rect x="245" y="148" width="120" height="30" rx="8" fill="url(#logoGrad)" filter="url(#glow)"/>
  <!-- Second bar of ₹ -->
  <rect x="245" y="198" width="105" height="28" rx="8" fill="url(#logoGrad)" filter="url(#glow)"/>

  <!-- ₹ diagonal stroke going down-left -->
  <polygon points="245,226 355,226 270,375 235,375" fill="url(#logoGrad)" filter="url(#glow)"/>
</svg>