<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0,
               minimum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <!-- Content Security Policy (SEC-3) -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.supabase.co; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-ancestors 'none';" />

    <!-- App Identity -->
    <title>Kanakku - Expense Tracker</title>
    <meta name="description" content="Track daily expenses and split bills with friends. UPI-focused expense management for India." />
    <meta name="author" content="Kanakku" />
    <meta name="keywords" content="expense tracker, bill splitting, UPI, India, money management, finance app" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0b0b11" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kanakku" />
    <meta name="application-name" content="Kanakku" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:title" content="Kanakku - Expense Tracker" />
    <meta property="og:description" content="Track daily expenses and split bills with friends. UPI-focused expense management for India." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kanakku - Expense Tracker" />
    <meta name="twitter:description" content="Track daily expenses and split bills with friends." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Preconnect to external origins (P-2: reduces connection setup time) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Logo preload: ensures it's fetched before the splash screen renders (P-5) -->
    <link rel="preload" as="image" href="/logo.png" />

    <!-- Non-blocking Google Fonts (P-2: print media trick — font loads async, avoids render-blocking) -->
    <link rel="preload" as="style"
          href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
          media="print" onload="this.media='all'" />
    <noscript>
      <link rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" />
    </noscript>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
